name: Daily WHOOP Summary

on:
  schedule:
    - cron: "30 15 * * *"  # Slot 1 - ~7:30 AM Pacific
    - cron: "0 18 * * *"   # Slot 2 - ~10:00 AM Pacific
    - cron: "30 20 * * *"  # Slot 3 - ~12:30 PM Pacific
    - cron: "0 1 * * *"    # Slot 4 - ~5:00 PM Pacific
    - cron: "30 5 * * *"   # Slot 5 - ~9:30 PM Pacific
  workflow_dispatch:

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pynacl

      - name: Determine run slot
        id: slot
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          TIME_VAL=$((HOUR * 60 + MIN))
          if [ $TIME_VAL -ge 900 ] && [ $TIME_VAL -lt 1020 ]; then
            SLOT=1
          elif [ $TIME_VAL -ge 1020 ] && [ $TIME_VAL -lt 1200 ]; then
            SLOT=2
          elif [ $TIME_VAL -ge 1200 ] && [ $TIME_VAL -lt 1380 ]; then
            SLOT=3
          elif [ $TIME_VAL -ge 0 ] && [ $TIME_VAL -lt 180 ]; then
            SLOT=4
          else
            SLOT=5
          fi
          echo "slot=$SLOT" >> $GITHUB_OUTPUT

      - name: Generate summary
        env:
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REFRESH_TOKEN: ${{ secrets.WHOOP_REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TZ_NAME: America/Los_Angeles
          RUN_SLOT: ${{ steps.slot.outputs.slot }}
        run: python scripts/daily_summary.py

      - name: Commit changes
        run: |
          if [ -f __should_commit__ ]; then
            rm __should_commit__
            git config user.name "kylealzayadi"
            git config user.email "40701337+kylealzayadi@users.noreply.github.com"
            git add summaries README.md
            git commit -m "Daily summary" || echo "no changes to commit"
            git push
          else
            echo "Script decided not to commit this run."
          fi
